<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro-Equipment & FOV Rechner</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: #16213e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            position: relative;
        }
        h1 {
            grid-column: span 2;
            text-align: center;
            color: #4cc9f0;
            margin-bottom: 20px;
        }
        .section {
            background: #0f3460;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #4cc9f0;
        }
        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            color: #4cc9f0;
            border-bottom: 1px solid #4cc9f0;
            padding-bottom: 5px;
        }
        .input-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: none;
            background: #e0e0e0;
            color: #1a1a2e;
            box-sizing: border-box;
        }
        .results {
            grid-column: span 2;
            background: #1a1a2e;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #4cc9f0;
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .result-text {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .result-item {
            font-size: 1.1rem;
        }
        .highlight {
            color: #4cc9f0;
            font-weight: bold;
        }
        button#calcBtn {
            grid-column: span 2;
            padding: 15px;
            font-size: 1.1rem;
            background-color: #4cc9f0;
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button#calcBtn:hover {
            background-color: #4895ef;
        }
        .sampling-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
            margin-left: 10px;
        }
        .oversampled { background: #f72585; color: white; }
        .ideal { background: #4caf50; color: white; }
        .undersampled { background: #ff9800; color: white; }

        /* Visualization Canvas */
        #canvasContainer {
            background: #000;
            border-radius: 10px;
            border: 1px solid #4cc9f0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            height: 300px;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
        }
        .canvas-label {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 0.8rem;
            color: #aaa;
            pointer-events: none;
        }

        /* Help icons and popups */
        .help-icon {
            display: inline-block;
            width: 14px;
            height: 14px;
            background: transparent;
            color: #6a9ab0;
            border: 1px solid #6a9ab0;
            border-radius: 50%;
            font-size: 0.65rem;
            font-weight: bold;
            text-align: center;
            line-height: 13px;
            cursor: pointer;
            margin-left: 5px;
            vertical-align: text-top;
            user-select: none;
            flex-shrink: 0;
            transition: color 0.2s, border-color 0.2s;
        }
        .help-icon:hover {
            color: #4cc9f0;
            border-color: #4cc9f0;
        }
        .help-popup {
            display: none;
            position: fixed;
            background: #0f3460;
            border: 1px solid #4cc9f0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #e0e0e0;
            max-width: 280px;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .help-popup.visible {
            display: block;
        }
        .help-popup strong {
            color: #4cc9f0;
            display: block;
            margin-bottom: 5px;
        }
        .help-popup code {
            background: #1a1a2e;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 0.8rem;
            color: #90ee90;
        }

        /* Logo */
        .app-logo {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        .app-logo img {
            height: 100px;
            width: auto;
            border-radius: 8px;
        }

        /* Footer */
        .app-footer {
            grid-column: span 2;
            text-align: center;
            padding-top: 10px;
            font-size: 0.8rem;
            color: #6a9ab0;
            border-top: 1px solid #0f3460;
        }
        .app-footer a {
            color: #6a9ab0;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }
        .app-footer a:hover { color: #4cc9f0; }

        /* About overlay */
        .about-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .about-overlay.visible { display: flex; }
        .about-box {
            background: #16213e;
            border: 2px solid #4cc9f0;
            border-radius: 15px;
            padding: 30px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            position: relative;
        }
        .about-box .about-logos {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
        }
        .about-box .about-logos img {
            height: 150px;
            width: auto;
            border-radius: 8px;
        }
        .about-box h2 {
            color: #4cc9f0;
            margin: 0 0 15px 0;
            border: none;
            font-size: 1.3rem;
        }
        .about-box p {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #ccc;
            margin: 0 0 12px 0;
        }
        .about-box .about-meta {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 8px;
        }
        .about-box .about-meta span { color: #4cc9f0; }
        .about-box a.about-github {
            display: inline-block;
            margin-top: 5px;
            color: #4cc9f0;
            font-size: 0.85rem;
            text-decoration: none;
        }
        .about-box a.about-github:hover { text-decoration: underline; }
        .about-close-btn {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: #4cc9f0;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .about-close-btn:hover { background: #4895ef; }

        /* Language switcher */
        .lang-switcher {
            grid-column: span 2;
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-bottom: -10px;
        }
        .lang-btn {
            padding: 4px 10px;
            font-size: 0.8rem;
            background: transparent;
            color: #6a9ab0;
            border: 1px solid #6a9ab0;
            border-radius: 4px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        .lang-btn:hover, .lang-btn.active {
            color: #4cc9f0;
            border-color: #4cc9f0;
        }

        /* Tabs */
        .tab-bar {
            grid-column: span 2;
            display: flex;
            gap: 4px;
            border-bottom: 2px solid #4cc9f0;
            margin-bottom: -10px;
        }
        .tab-btn {
            padding: 8px 20px;
            font-size: 0.95rem;
            background: transparent;
            color: #6a9ab0;
            border: 1px solid #6a9ab0;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
        }
        .tab-btn:hover { color: #4cc9f0; border-color: #4cc9f0; }
        .tab-btn.active { background: #0f3460; color: #4cc9f0; border-color: #4cc9f0; }
        .tab-panel { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .tab-panel.hidden { display: none; }
        .tab-panel .smart-select-box,
        .tab-panel button#smartCompareBtn,
        .tab-panel .smart-results,
        .tab-panel .results { grid-column: span 2; }

        /* Smart telescope tab */
        .smart-select-box {
            grid-column: span 2;
            background: #0f3460;
            border: 1px solid #4cc9f0;
            border-radius: 10px;
            padding: 15px;
        }
        .smart-select-box h2 { margin-top: 0; }
        .smart-telescope-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }
        .smart-vendor-group {
            flex: 1 1 180px;
            min-width: 160px;
        }
        .smart-vendor-label {
            font-size: 0.75rem;
            font-weight: bold;
            color: #4cc9f0;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #4cc9f0;
        }
        .smart-checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            background: #1a1a2e;
            padding: 7px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }
        .smart-checkbox-item:hover { background: #16213e; }
        .smart-checkbox-item input[type=checkbox] {
            width: auto;
            margin-top: 2px;
            accent-color: #4cc9f0;
            cursor: pointer;
            flex-shrink: 0;
        }
        .smart-checkbox-item label {
            margin: 0;
            cursor: pointer;
            font-size: 0.9rem;
            line-height: 1.3;
        }
        .smart-details-toggle {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.85rem;
            color: #aaa;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .smart-details-toggle input[type=checkbox] {
            width: auto;
            accent-color: #4cc9f0;
            cursor: pointer;
        }
        .smart-object-row {
            grid-column: span 2;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .smart-object-row label { margin: 0; white-space: nowrap; }
        .smart-object-row select { max-width: 280px; }
        button#smartCompareBtn {
            grid-column: span 2;
            padding: 15px;
            font-size: 1.1rem;
            background-color: #4cc9f0;
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button#smartCompareBtn:hover { background-color: #4895ef; }

        /* Comparison results */
        .smart-results {
            grid-column: span 2;
        }
        .smart-table-wrap {
            overflow-x: auto;
            margin-bottom: 20px;
        }
        .smart-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        .smart-table th {
            background: #0f3460;
            color: #4cc9f0;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 2px solid #4cc9f0;
            white-space: nowrap;
        }
        .smart-table td {
            padding: 9px 12px;
            border-bottom: 1px solid #0f3460;
            vertical-align: top;
        }
        .smart-table tr:nth-child(even) td { background: #16213e; }
        .smart-table tr:hover td { background: #0f3460; }
        .smart-canvas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .smart-canvas-item {
            background: #000;
            border: 1px solid #4cc9f0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .smart-canvas-item .canvas-title {
            position: absolute;
            top: 6px;
            left: 8px;
            font-size: 0.75rem;
            color: #4cc9f0;
            pointer-events: none;
            z-index: 1;
        }
        .canvas-tooltip {
            display: none;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 20, 40, 0.92);
            border: 1px solid #4cc9f0;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.78rem;
            color: #e0e0e0;
            white-space: nowrap;
            z-index: 10;
            pointer-events: none;
            line-height: 1.6;
            text-align: left;
        }
        #canvasContainer:hover .canvas-tooltip,
        .smart-canvas-item:hover .canvas-tooltip {
            display: block;
        }
    </style>
    <script data-goatcounter="https://astrorechner.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</head>
<body>

<div class="container">
    <div class="app-logo">
        <img src="data/img/Logo.jpg" alt="AstroRechner Logo">
    </div>
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLanguage('de')">DE</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('fr')">FR</button>
        <button class="lang-btn" onclick="setLanguage('es')">ES</button>
    </div>

    <h1 id="appTitle"></h1>

    <!-- TAB BAR -->
    <div class="tab-bar">
        <button class="tab-btn active" id="tabBtnCalculator" onclick="switchTab('calculator')"></button>
        <button class="tab-btn" id="tabBtnSmart" onclick="switchTab('smart')"></button>
    </div>

    <!-- TAB: RECHNER -->
    <div class="tab-panel" id="tabCalculator">

    <!-- TELESKOP SEKTION -->
    <div class="section">
        <h2 data-i18n="telescope"></h2>
        <div class="input-group">
            <label data-i18n="selectPreset"></label>
            <select id="telescopePreset" onchange="applyTelescopePreset()"></select>
        </div>
        <div class="input-group">
            <label data-i18n="aperture"></label>
            <input type="number" id="aperture" data-i18n-placeholder="aperturePlaceholder">
        </div>
        <div class="input-group">
            <label data-i18n="focalLength"></label>
            <input type="number" id="focalLength" data-i18n-placeholder="focalLengthPlaceholder">
        </div>
        <div class="input-group">
            <label data-i18n="corrector"></label>
            <input type="number" id="corrector" value="1.0" step="0.1">
        </div>
    </div>

    <!-- KAMERA SEKTION -->
    <div class="section">
        <h2 data-i18n="camera"></h2>
        <div class="input-group">
            <label data-i18n="selectPreset"></label>
            <select id="cameraPreset" onchange="applyCameraPreset()"></select>
        </div>
        <div class="input-group">
            <label data-i18n="sensorX"></label>
            <input type="number" id="sensorX" step="0.01">
        </div>
        <div class="input-group">
            <label data-i18n="sensorY"></label>
            <input type="number" id="sensorY" step="0.01">
        </div>
        <div class="input-group">
            <label data-i18n="pixelSize"></label>
            <input type="number" id="pixelSize" step="0.01">
        </div>
        <div class="input-group">
            <label data-i18n="targetObject"></label>
            <select id="objectPreset"></select>
        </div>
    </div>

    <button id="calcBtn" onclick="calculate()"></button>

    <div class="results">
        <div class="result-text" id="resultText">
            <div class="result-item" id="resultsPlaceholder"></div>
        </div>
        <div id="canvasContainer">
            <div class="canvas-label" data-i18n="canvasLabel"></div>
            <canvas id="fovCanvas" width="400" height="320"></canvas>
            <div class="canvas-tooltip" id="fovTooltip"></div>
        </div>
    </div>

    </div><!-- end tabCalculator -->

    <!-- TAB: SMART TELESKOPE -->
    <div class="tab-panel hidden" id="tabSmart">

        <div class="smart-select-box">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
                <h2 data-i18n="smartTelescopeTitle" style="margin:0;"></h2>
                <label class="smart-details-toggle" id="smartDetailsToggleLabel">
                    <input type="checkbox" id="smartDetailsToggle" onchange="renderSmartTelescopeList()">
                    <span data-i18n="smartShowDetails"></span>
                </label>
            </div>
            <div class="input-group">
                <label data-i18n="smartSelectLabel"></label>
                <div class="smart-telescope-list" id="smartTelescopeList"></div>
            </div>
            <div class="smart-object-row input-group">
                <label data-i18n="smartTargetObject"></label>
                <select id="smartObjectPreset"></select>
            </div>
        </div>

        <button id="smartCompareBtn" onclick="compareSmartTelescopes()"></button>

        <div class="smart-results" id="smartResults"></div>

    </div><!-- end tabSmart -->

    <div class="app-footer">
        <a id="aboutLink" onclick="document.getElementById('aboutOverlay').classList.add('visible')"></a>
    </div>

</div>

<!-- ABOUT OVERLAY -->
<div class="about-overlay" id="aboutOverlay" onclick="handleOverlayClick(event)">
    <div class="about-box">
        <div class="about-logos">
            <img src="data/img/Logo.jpg" alt="AstroRechner">
            <img src="data/img/MiceInSpaceLogo.jpg" alt="MiceInSpace Development">
        </div>
        <h2 id="aboutTitle"></h2>
        <p id="aboutDescription"></p>
        <div class="about-meta" id="aboutDeveloper"></div>
        <div class="about-meta" id="aboutLicense"></div>
        <a class="about-github" href="https://github.com/mkeller0815/AstroRechner" target="_blank" id="aboutGithub"></a>
        <button class="about-close-btn" id="aboutCloseBtn" onclick="document.getElementById('aboutOverlay').classList.remove('visible')"></button>
    </div>
</div>

<div class="help-popup" id="helpPopup"></div>

<script src="data/lang/de.js"></script>
<script src="data/lang/en.js"></script>
<script src="data/lang/fr.js"></script>
<script src="data/lang/es.js"></script>
<script src="data/telescopes.js"></script>
<script src="data/smarttelescopes.js"></script>
<script src="data/cameras.js"></script>
<script src="data/objects.js"></script>
<script>
    const languages = { de: lang_de, en: lang_en, fr: lang_fr, es: lang_es };
    let currentLang = 'de';
    let T = languages[currentLang];

    function setLanguage(code) {
        currentLang = code;
        T = languages[code];
        document.documentElement.lang = code;
        document.title = T.pageTitle;

        // Update static i18n elements
        document.getElementById('appTitle').textContent = T.appTitle;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.dataset.i18n;
            if (T[key] !== undefined) el.textContent = T[key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.dataset.i18nPlaceholder;
            if (T[key] !== undefined) el.placeholder = T[key];
        });
        document.getElementById('calcBtn').textContent = T.calculate;
        const placeholder = document.getElementById('resultsPlaceholder');
        if (placeholder) placeholder.textContent = T.resultsPlaceholder;

        // Update preset dropdowns
        rebuildPresets();

        // Update active button state
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent.toLowerCase() === code);
        });

        // About overlay
        document.getElementById('aboutLink').textContent = T.aboutCopyright;
        document.getElementById('aboutTitle').textContent = T.aboutTitle;
        document.getElementById('aboutDescription').textContent = T.aboutDescription;
        document.getElementById('aboutDeveloper').innerHTML = `${T.aboutDeveloper}: <span>MiceInSpace Development</span>`;
        document.getElementById('aboutLicense').innerHTML = `${T.aboutLicense}: <span>${T.aboutLicenseText}</span>`;
        document.getElementById('aboutGithub').textContent = T.aboutGithub;
        document.getElementById('aboutCloseBtn').textContent = T.aboutClose;

        // Re-render results if calculation was already done
        if (window._calculated) {
            calculate();
        }
        if (window._smartCalculated) {
            compareSmartTelescopes();
        }
    }

    function switchTab(tab) {
        document.getElementById('tabCalculator').classList.toggle('hidden', tab !== 'calculator');
        document.getElementById('tabSmart').classList.toggle('hidden', tab !== 'smart');
        document.getElementById('tabBtnCalculator').classList.toggle('active', tab === 'calculator');
        document.getElementById('tabBtnSmart').classList.toggle('active', tab === 'smart');
    }

    function rebuildPresets() {
        const tSelect = document.getElementById('telescopePreset');
        const tVal = tSelect.value;
        tSelect.innerHTML = `<option value="">${T.selectPresetPlaceholder}</option>`;
        telescopeData.forEach((t, i) => tSelect.options[tSelect.options.length] = new Option(t.name, i));
        tSelect.value = tVal;

        const cSelect = document.getElementById('cameraPreset');
        const cVal = cSelect.value;
        cSelect.innerHTML = `<option value="">${T.selectPresetPlaceholder}</option>`;
        cameraData.forEach((c, i) => cSelect.options[cSelect.options.length] = new Option(c.name, i));
        cSelect.value = cVal;

        const oSelect = document.getElementById('objectPreset');
        const oVal = oSelect.value;
        oSelect.innerHTML = '';
        objectData.forEach((o, i) => oSelect.options[oSelect.options.length] = new Option(T.objects[o.id], i));
        oSelect.value = oVal;

        // Smart tab object dropdown
        const soSelect = document.getElementById('smartObjectPreset');
        const soVal = soSelect.value;
        soSelect.innerHTML = '';
        objectData.forEach((o, i) => soSelect.options[soSelect.options.length] = new Option(T.objects[o.id], i));
        soSelect.value = soVal;

        renderSmartTelescopeList();

        // Tab button labels
        document.getElementById('tabBtnCalculator').textContent = T.tabCalculator;
        document.getElementById('tabBtnSmart').textContent = T.tabSmartTelescopes;
        document.getElementById('smartCompareBtn').textContent = T.smartCompareBtn;
    }

    function renderSmartTelescopeList() {
        const list = document.getElementById('smartTelescopeList');
        const checked = Array.from(list.querySelectorAll('input:checked')).map(cb => cb.value);
        list.innerHTML = '';
        const showDetails = document.getElementById('smartDetailsToggle')?.checked;
        const vendors = [...new Set(smartTelescopeData.map(st => st.vendor))].sort();
        vendors.forEach(vendor => {
            const group = document.createElement('div');
            group.className = 'smart-vendor-group';
            group.innerHTML = `<div class="smart-vendor-label">${vendor}</div>`;
            smartTelescopeData.forEach((st, i) => {
                if (st.vendor !== vendor) return;
                const id = `stcheck_${i}`;
                const item = document.createElement('div');
                item.className = 'smart-checkbox-item';
                const detailsHtml = showDetails
                    ? `<br><small style="color:#6a9ab0">${st.sensor.name} · ${st.focalLength}mm · f/${(st.focalLength/st.aperture).toFixed(1)}</small>`
                    : '';
                item.innerHTML = `<input type="checkbox" id="${id}" value="${i}" ${checked.includes(String(i)) ? 'checked' : ''}><label for="${id}">${st.name}${detailsHtml}</label>`;
                group.appendChild(item);
            });
            list.appendChild(group);
        });
    }

    window.onload = () => {
        // Resolve smart telescope sensor string IDs to full sensor objects from cameraData
        smartTelescopeData.forEach(st => {
            if (typeof st.sensor === 'string') {
                st.sensor = sensorById[st.sensor] || { name: st.sensor, sensorX: 0, sensorY: 0, pixelSize: 0 };
            }
        });
        setLanguage('de');
    };

    function applyTelescopePreset() {
        const idx = document.getElementById('telescopePreset').value;
        if (idx === "") return;
        const t = telescopeData[idx];
        document.getElementById('aperture').value = t.aperture;
        document.getElementById('focalLength').value = t.focalLength;
    }

    function applyCameraPreset() {
        const idx = document.getElementById('cameraPreset').value;
        if (idx === "") return;
        const c = cameraData[idx];
        document.getElementById('sensorX').value = c.sensorX;
        document.getElementById('sensorY').value = c.sensorY;
        document.getElementById('pixelSize').value = c.pixelSize;
    }

    function degToDMS(deg) {
        const d = Math.floor(deg);
        const minFloat = (deg - d) * 60;
        const m = Math.floor(minFloat);
        const s = ((minFloat - m) * 60).toFixed(2);
        return `${d}° ${m}' ${s}''`;
    }

    function calculate() {
        const ap = parseFloat(document.getElementById('aperture').value);
        const fl = parseFloat(document.getElementById('focalLength').value);
        const corr = parseFloat(document.getElementById('corrector').value) || 1.0;
        const sX = parseFloat(document.getElementById('sensorX').value);
        const sY = parseFloat(document.getElementById('sensorY').value);
        const pSize = parseFloat(document.getElementById('pixelSize').value);
        const objIdx = document.getElementById('objectPreset').value;

        if (!ap || !fl || !sX || !sY || !pSize) {
            alert(T.alertFillAll);
            return;
        }

        document.getElementById('resultText').dataset.calculated = '1';
        // Re-render results if language is switched after calculation
        // Store flag outside resultText since innerHTML replacement wipes dataset
        window._calculated = true;

        const effectiveFL = fl * corr;
        const fRatio = effectiveFL / ap;
        const fovX = (sX / effectiveFL) * (180 / Math.PI);
        const fovY = (sY / effectiveFL) * (180 / Math.PI);
        const arcsecPerPx = (pSize / effectiveFL) * 206.265;

        const rayleigh = (lambda) => (lambda * 1.22 * 0.206265) / ap;
        const dawes = (lambda) => (lambda * 1.02 * 0.206265) / ap;

        const limitViolet = rayleigh(400);
        const limitGreen = rayleigh(550);
        const limitRed = rayleigh(700);

        const dawesViolet = dawes(400);
        const dawesGreen = dawes(550);
        const dawesRed = dawes(700);

        let samplingText = "";
        let samplingClass = "";
        if (arcsecPerPx < 0.8) {
            samplingText = T.oversampling;
            samplingClass = "oversampled";
        } else if (arcsecPerPx >= 0.8 && arcsecPerPx <= 2.0) {
            samplingText = T.optimalSampling;
            samplingClass = "ideal";
        } else {
            samplingText = T.undersampling;
            samplingClass = "undersampled";
        }

        document.getElementById('resultText').innerHTML = `
            <div class="result-item">
                ${T.fRatio} <span class="help-icon" data-help="fratio">?</span><br>
                <span class="highlight">f/${fRatio.toFixed(1)}</span>
            </div>
            <div class="result-item">
                ${T.fov} <span class="help-icon" data-help="fov">?</span><br>
                <span class="highlight">${fovX.toFixed(2)}° x ${fovY.toFixed(2)}°</span><br>
                <span style="font-size:0.9rem;color:#aaa">${degToDMS(fovX)} x ${degToDMS(fovY)}</span>
            </div>
            <div class="result-item">
                ${T.imageScale} <span class="help-icon" data-help="scale">?</span><br>
                <span class="highlight">${arcsecPerPx.toFixed(2)} ${T.imageScaleUnit}</span>
            </div>
            <div class="result-item">
                ${T.rayleighLimit} <span class="help-icon" data-help="rayleigh">?</span><br>
                <span style="color: #b19cd9">V: ${limitViolet.toFixed(2)}''</span> |
                <span style="color: #90ee90">G: ${limitGreen.toFixed(2)}''</span> |
                <span style="color: #ffb6c1">R: ${limitRed.toFixed(2)}''</span>
            </div>
            <div class="result-item">
                ${T.dawesLimit} <span class="help-icon" data-help="dawes">?</span><br>
                <span style="color: #b19cd9">V: ${dawesViolet.toFixed(2)}''</span> |
                <span style="color: #90ee90">G: ${dawesGreen.toFixed(2)}''</span> |
                <span style="color: #ffb6c1">R: ${dawesRed.toFixed(2)}''</span>
            </div>
            <div class="result-item">
                ${T.sampling} <span class="help-icon" data-help="sampling">?</span>
                <span class="sampling-badge ${samplingClass}">${samplingText}</span>
            </div>
        `;
        attachHelpIcons();

        drawFOV(fovX, fovY, objIdx, effectiveFL, pSize);
    }

    function attachHelpIcons() {
        document.querySelectorAll('.help-icon').forEach(icon => {
            icon.addEventListener('click', (e) => {
                e.stopPropagation();
                const key = icon.dataset.help;
                const info = T.help[key];
                const popup = document.getElementById('helpPopup');

                if (popup.classList.contains('visible') && popup.dataset.current === key) {
                    popup.classList.remove('visible');
                    return;
                }

                popup.innerHTML = `<strong>${info.title}</strong>${info.text}<br><br><code>${info.formula}</code>`;
                popup.dataset.current = key;

                const rect = icon.getBoundingClientRect();
                const popupWidth = 280;
                let left = rect.right + 8;
                if (left + popupWidth > window.innerWidth - 10) {
                    left = rect.left - popupWidth - 8;
                }
                popup.style.left = left + 'px';
                popup.style.top = Math.min(rect.top, window.innerHeight - 200) + 'px';
                popup.classList.add('visible');
            });
        });
    }

    document.addEventListener('click', () => {
        document.getElementById('helpPopup').classList.remove('visible');
    });

    function compareSmartTelescopes() {
        const checked = Array.from(document.querySelectorAll('#smartTelescopeList input:checked'));
        if (checked.length === 0) { alert(T.smartNoSelection); return; }
        window._smartCalculated = true;

        const objIdx = document.getElementById('smartObjectPreset').value;
        const obj = objectData[objIdx];
        const results = checked.map(cb => {
            const st = smartTelescopeData[parseInt(cb.value)];
            const fRatio = st.focalLength / st.aperture;
            const fovX = (st.sensor.sensorX / st.focalLength) * (180 / Math.PI);
            const fovY = (st.sensor.sensorY / st.focalLength) * (180 / Math.PI);
            const scale = (st.sensor.pixelSize / st.focalLength) * 206.265;
            let samplingClass = scale < 0.8 ? 'oversampled' : scale <= 2.0 ? 'ideal' : 'undersampled';
            let samplingText = scale < 0.8 ? T.oversampling : scale <= 2.0 ? T.optimalSampling : T.undersampling;
            return { st, fRatio, fovX, fovY, scale, samplingClass, samplingText };
        });

        // Table
        const tableRows = results.map(r => `
            <tr>
                <td><strong>${r.st.vendor} ${r.st.name}</strong></td>
                <td>${r.st.sensor.name}</td>
                <td>${r.st.aperture} mm</td>
                <td>${r.st.focalLength} mm</td>
                <td>f/${r.fRatio.toFixed(1)}</td>
                <td><span class="highlight">${r.fovX.toFixed(2)}° × ${r.fovY.toFixed(2)}°</span><br>
                    <small style="color:#aaa">${degToDMS(r.fovX)} × ${degToDMS(r.fovY)}</small></td>
                <td>${r.scale.toFixed(2)} ${T.imageScaleUnit}</td>
                <td><span class="sampling-badge ${r.samplingClass}">${r.samplingText}</span></td>
            </tr>`).join('');

        // Canvas previews
        const canvases = results.map((r, idx) => {
            const canvasId = `smartCanvas_${idx}`;
            return `<div class="smart-canvas-item" id="smartCanvasWrap_${idx}">
                <div class="canvas-title">${r.st.vendor} ${r.st.name}</div>
                <canvas id="${canvasId}" width="300" height="240"></canvas>
                <div class="canvas-tooltip" id="smartTooltip_${idx}"></div>
            </div>`;
        }).join('');

        document.getElementById('smartResults').innerHTML = `
            <div class="smart-table-wrap">
                <table class="smart-table">
                    <thead><tr>
                        <th>${T.smartColTelescope}</th>
                        <th>${T.smartColSensor}</th>
                        <th>${T.smartColAperture}</th>
                        <th>${T.smartColFocalLength}</th>
                        <th>${T.smartColFRatio} <span class="help-icon" data-help="fratio">?</span></th>
                        <th>${T.smartColFov} <span class="help-icon" data-help="fov">?</span></th>
                        <th>${T.smartColScale} <span class="help-icon" data-help="scale">?</span></th>
                        <th>${T.smartColSampling} <span class="help-icon" data-help="sampling">?</span></th>
                    </tr></thead>
                    <tbody>${tableRows}</tbody>
                </table>
            </div>
            <div class="smart-canvas-grid">${canvases}</div>`;

        // Draw each canvas
        results.forEach((r, idx) => {
            const canvas = document.getElementById(`smartCanvas_${idx}`);
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2, cy = canvas.height / 2;
            const maxDim = Math.max(r.fovX, r.fovY, obj.widthDeg, obj.heightDeg);
            const scale = (canvas.width * 0.8) / maxDim;

            ctx.beginPath();
            ctx.ellipse(cx, cy, (obj.widthDeg * scale) / 2, (obj.heightDeg * scale) / 2, 0, 0, 2 * Math.PI);
            ctx.fillStyle = obj.color;
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 1;
            ctx.stroke();

            const sensorW = r.fovX * scale, sensorH = r.fovY * scale;
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.strokeRect(cx - sensorW / 2, cy - sensorH / 2, sensorW, sensorH);

            const objPxW = Math.round((obj.widthDeg * 3600 * r.st.focalLength) / (r.st.sensor.pixelSize * 206.265));
            const objPxH = Math.round((obj.heightDeg * 3600 * r.st.focalLength) / (r.st.sensor.pixelSize * 206.265));
            const labelY = cy + (Math.max(sensorH, obj.heightDeg * scale) / 2) + 17;

            ctx.fillStyle = 'white';
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(T.objects[obj.id], cx, labelY);
            ctx.fillStyle = '#aaa';
            ctx.font = '11px Arial';
            ctx.fillText(`${objPxW} × ${objPxH} px`, cx, labelY + 15);

            const tooltip = document.getElementById(`smartTooltip_${idx}`);
            if (tooltip) {
                tooltip.innerHTML =
                    `<strong>${T.objects[obj.id]}</strong><br>` +
                    `📐 ${obj.widthDeg.toFixed(2)}° × ${obj.heightDeg.toFixed(2)}°` +
                    ` (${(obj.widthDeg * 60).toFixed(1)}' × ${(obj.heightDeg * 60).toFixed(1)}')<br>` +
                    `🔲 ${objPxW} × ${objPxH} px @ ${r.st.sensor.pixelSize} µm/px`;
            }
        });

        attachHelpIcons();
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('aboutOverlay')) {
            document.getElementById('aboutOverlay').classList.remove('visible');
        }
    }

    function drawFOV(fovX, fovY, objIdx, focalLength, pixelSize) {
        const canvas = document.getElementById('fovCanvas');
        const ctx = canvas.getContext('2d');
        const obj = objectData[objIdx];

        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        const maxDim = Math.max(fovX, fovY, obj.widthDeg, obj.heightDeg);
        const scale = (canvas.width * 0.8) / maxDim;

        ctx.beginPath();
        ctx.ellipse(centerX, centerY, (obj.widthDeg * scale) / 2, (obj.heightDeg * scale) / 2, 0, 0, 2 * Math.PI);
        ctx.fillStyle = obj.color;
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.beginPath();
        const sensorW = fovX * scale;
        const sensorH = fovY * scale;
        ctx.rect(centerX - sensorW / 2, centerY - sensorH / 2, sensorW, sensorH);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();

        const objPxW = Math.round((obj.widthDeg * 3600 * focalLength) / (pixelSize * 206.265));
        const objPxH = Math.round((obj.heightDeg * 3600 * focalLength) / (pixelSize * 206.265));
        const labelY = centerY + (Math.max(sensorH, (obj.heightDeg * scale)) / 2) + 18;

        ctx.fillStyle = "white";
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "center";
        ctx.fillText(T.objects[obj.id], centerX, labelY);
        ctx.fillStyle = "#aaa";
        ctx.font = "12px Arial";
        ctx.fillText(`${objPxW} × ${objPxH} px`, centerX, labelY + 17);

        const tooltip = document.getElementById('fovTooltip');
        if (tooltip) {
            tooltip.innerHTML =
                `<strong>${T.objects[obj.id]}</strong><br>` +
                `📐 ${T.fov}: ${obj.widthDeg.toFixed(2)}° × ${obj.heightDeg.toFixed(2)}°` +
                ` (${(obj.widthDeg * 60).toFixed(1)}' × ${(obj.heightDeg * 60).toFixed(1)}')<br>` +
                `🔲 ${objPxW} × ${objPxH} px @ ${pixelSize} µm/px`;
        }
    }
</script>
